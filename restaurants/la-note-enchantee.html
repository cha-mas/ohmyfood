<!doctype html>
<html lang="en">

                    <input type="checkbox" id="fav-1" class="fav-checkbox" checked />

                                <linearGradient id="heart-gradient" x1="0%" y1="100%" x2="0%" y2="0%">

                            </defs>

                                    </div>
                                    <div class="menu-card-price">
                                        <span>25€</span>
                                    </div>
                                    <div class="menu-card-checkmark">
                                        <span class="menu-card-checkmark-icon">

                                    </div>
                                </div>
                            </label>
                        </li>

                                <input type="checkbox" class="menu-card-checkbox" />

                                        <span>35€</span>

                                    <div class="menu-card-checkmark">

                                            <i class="fa-solid fa-check"></i>

                                </div>
