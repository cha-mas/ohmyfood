<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Commander chez À la Française - Menu gastronomique à Cité Rouge. OhMyFood, réservation de restaurants d'exception." />
    <title>Commander chez À la Française - OhMyFood</title>
    
    <!-- External stylesheet: Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <!-- Main stylesheet: Compiled SCSS -->
    <link rel="stylesheet" href="../assets/css/bundle.css" />
</head>

<body>
    <!-- ========================================
         SHARED SVG DEFINITIONS
         Contains reusable SVG gradients and definitions
         accessible via url(#id) throughout the page
    ======================================== -->
    <svg style="position: absolute; width: 0; height: 0; overflow: hidden;" aria-hidden="true">
        <defs>
            <!-- Gradient used for heart favorite button fill animation -->
            <linearGradient id="heart-gradient" x1="0%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" stop-color="#ff79da" />
                <stop offset="95%" stop-color="#9356dc" />
            </linearGradient>
        </defs>
    </svg>

    <!-- ========================================
         SKIP TO CONTENT LINK
         Allows keyboard users to skip navigation
    ======================================== -->
    <a href="#main-content" class="skip-link sr-only">Aller au contenu principal</a>

    <!-- ========================================
         HEADER WITH BACK NAVIGATION
         Logo and return to home link
    ======================================== -->
    <header class="header-with-arrow">
        <a href="../index.html" aria-label="Retour à la page d'accueil">
            <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
            <span class="sr-only">Retour à la page d'accueil</span>
        </a>
        <img srcset="../assets/images/logo/ohmyfood.png, ../assets/images/logo/ohmyfood@2x.svg 2x"
            src="../assets/images/logo/ohmyfood.png"
            alt="Logo OhMyFood"
            width="197"
            height="36" />
    </header>

    <!-- ========================================
         HERO IMAGE
         Restaurant hero photograph
    ======================================== -->
    <img src="../assets/images/restaurants/toa-heftiba-DQKerTsQwi0-unsplash.jpg"
        class="hero-media"
        alt="Photo du restaurant À la française"
        loading="lazy" />

    <!-- ========================================
         MAIN CONTENT
         Restaurant menu and ordering form
    ======================================== -->
    <main id="main-content">
        <form class="menu-container" aria-label="Menu du restaurant À la française">
            
            <!-- ========================================
                 RESTAURANT INFO
                 Name and favorite toggle
            ======================================== -->
            <div class="restaurant-info">
                <h1>À la française</h1>
                <!-- Favorite toggle button -->
                <input type="checkbox" id="fav-1" class="fav-checkbox" aria-label="Ajouter aux favoris" />
                <label for="fav-1" class="fav-label" role="button" tabindex="0">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path class="heart-outline"
                            d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                        <path class="heart-fill"
                            d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                    </svg>
                    <span class="sr-only">Ajouter ou supprimer de vos favoris</span>
                </label>
            </div>

            <!-- ========================================
                 STARTERS MENU CATEGORY
            ======================================== -->
            <div class="menu-category">
                <h2>Entrées</h2>
                <ul role="list">
                    <!-- Menu item: Tartare de poulpe acidulé -->
                    <li role="listitem">
                        <label class="menu-card">
                            <input type="checkbox" class="menu-card-checkbox" aria-label="Sélectionner Tartare de poulpe acidulé" />
                            <div class="menu-card-content">
                                <div class="menu-card-info">
                                    <h3 class="menu-card-title">Tartare de poulpe acidulé</h3>
                                    <p class="menu-card-description">Aux zestes d'orange</p>
                                </div>
                                <div class="menu-card-price">
                                    <span>25€</span>
                                </div>
                                <div class="menu-card-checkmark">
                                    <span class="menu-card-checkmark-icon">
                                        <i class="fa-solid fa-check" aria-hidden="true"></i>
                                    </span>
                                </div>
                            </div>
                        </label>
                    </li>
                    <!-- Menu item: Velouté de légumes d'antan -->
                    <li role="listitem">
                        <label class="menu-card">
                            <input type="checkbox" class="menu-card-checkbox" aria-label="Sélectionner Velouté de légumes d'antan" />
                            <div class="menu-card-content">
                                <div class="menu-card-info">
                                    <h3 class="menu-card-title">Velouté de légumes d'antan</h3>
                                    <p class="menu-card-description">Carotte, panais, topinambour</p>
                                </div>
                                <div class="menu-card-price">
                                    <span>35€</span>
                                </div>
                                <div class="menu-card-checkmark">
                                    <span class="menu-card-checkmark-icon">
                                        <i class="fa-solid fa-check" aria-hidden="true"></i>
                                    </span>
                                </div>
                            </div>
                        </label>
                    </li>
                    <!-- Menu item: Soupe à l'oignon -->
                    <li role="listitem">
                        <label class="menu-card">
                            <input type="checkbox" class="menu-card-checkbox" aria-label="Sélectionner Soupe à l'oignon" />
                            <div class="menu-card-content">
                                <div class="menu-card-info">
                                    <h3 class="menu-card-title">Soupe à l'oignon</h3>
                                    <p class="menu-card-description">Revisitée</p>
                                </div>
                                <div class="menu-card-price">
                                    <span>20€</span>
                                </div>
                                <div class="menu-card-checkmark">
                                    <span class="menu-card-checkmark-icon">
                                        <i class="fa-solid fa-check" aria-hidden="true"></i>
                                    </span>
                                </div>
                            </div>
                        </label>
                    </li>
                </ul>
            </div>

            <!-- ========================================
                 MAIN COURSES MENU CATEGORY
            ======================================== -->
            <div class="menu-category">
                <h2>Plats</h2>
                <ul role="list">
                    <!-- Menu item: Coquilles Saint-Jacques -->
                    <li role="listitem">
                        <label class="menu-card">
                            <input type="checkbox" class="menu-card-checkbox" aria-label="Sélectionner Coquilles Saint-Jacques" />
                            <div class="menu-card-content">
                                <div class="menu-card-info">
                                    <h3 class="menu-card-title">Coquilles Saint-Jacques</h3>
                                    <p class="menu-card-description">Accompagnées d'une purée de panais</p>
                                </div>
                                <div class="menu-card-price">
                                    <span>40€</span>
                                </div>
                                <div class="menu-card-checkmark">
                                    <span class="menu-card-checkmark-icon">
                                        <i class="fa-solid fa-check" aria-hidden="true"></i>
                                    </span>
                                </div>
                            </div>
                        </label>
                    </li>
                    <!-- Menu item: Magret de canard -->
                    <li role="listitem">
                        <label class="menu-card">
                            <input type="checkbox" class="menu-card-checkbox" aria-label="Sélectionner Magret de canard" />
                            <div class="menu-card-content">
                                <div class="menu-card-info">
                                    <h3 class="menu-card-title">Magret de canard</h3>
                                    <p class="menu-card-description">Et parmentier de pommes de terre</p>
                                </div>
                                <div class="menu-card-price">
                                    <span>35€</span>
                                </div>
                                <div class="menu-card-checkmark">
                                    <span class="menu-card-checkmark-icon">
                                        <i class="fa-solid fa-check" aria-hidden="true"></i>
                                    </span>
                                </div>
                            </div>
                        </label>
                    </li>
                    <!-- Menu item: Pigeonneau d'Ille-et-Vilaine -->
                    <li role="listitem">
                        <label class="menu-card">
                            <input type="checkbox" class="menu-card-checkbox" aria-label="Sélectionner Pigeonneau d'Ille-et-Vilaine" />
                            <div class="menu-card-content">
                                <div class="menu-card-info">
                                    <h3 class="menu-card-title">Pigeonneau d'Ille-et-Vilaine</h3>
                                    <p class="menu-card-description">Sur son lit de gnocchis aux légumes</p>
                                </div>
                                <div class="menu-card-price">
                                    <span>44€</span>
                                </div>
                                <div class="menu-card-checkmark">
                                    <span class="menu-card-checkmark-icon">
                                        <i class="fa-solid fa-check" aria-hidden="true"></i>
                                    </span>
                                </div>
                            </div>
                        </label>
                    </li>
                </ul>
            </div>

            <!-- ========================================
                 DESSERTS MENU CATEGORY
            ======================================== -->
            <div class="menu-category">
                <h2>Desserts</h2>
                <ul role="list">
                    <!-- Menu item: Pétales de violettes glacés -->
                    <li role="listitem">
                        <label class="menu-card">
                            <input type="checkbox" class="menu-card-checkbox" aria-label="Sélectionner Pétales de violettes glacés" />
                            <div class="menu-card-content">
                                <div class="menu-card-info">
                                    <h3 class="menu-card-title">Pétales de violettes glacés</h3>
                                    <p class="menu-card-description">Et purée de noisettes</p>
                                </div>
                                <div class="menu-card-price">
                                    <span>18€</span>
                                </div>
                                <div class="menu-card-checkmark">
                                    <span class="menu-card-checkmark-icon">
                                        <i class="fa-solid fa-check" aria-hidden="true"></i>
                                    </span>
                                </div>
                            </div>
                        </label>
                    </li>
                    <!-- Menu item: Fondant au chocolat -->
                    <li role="listitem">
                        <label class="menu-card">
                            <input type="checkbox" class="menu-card-checkbox" aria-label="Sélectionner Fondant au chocolat" />
                            <div class="menu-card-content">
                                <div class="menu-card-info">
                                    <h3 class="menu-card-title">Fondant au chocolat</h3>
                                    <p class="menu-card-description">Revisité</p>
                                </div>
                                <div class="menu-card-price">
                                    <span>22€</span>
                                </div>
                                <div class="menu-card-checkmark">
                                    <span class="menu-card-checkmark-icon">
                                        <i class="fa-solid fa-check" aria-hidden="true"></i>
                                    </span>
                                </div>
                            </div>
                        </label>
                    </li>
                    <!-- Menu item: Millefeuille croustillant -->
                    <li role="listitem">
                        <label class="menu-card">
                            <input type="checkbox" class="menu-card-checkbox" aria-label="Sélectionner Millefeuille croustillant" />
                            <div class="menu-card-content">
                                <div class="menu-card-info">
                                    <h3 class="menu-card-title">Millefeuille croustillant</h3>
                                    <p class="menu-card-description">Myrtilles et pâte d'amande</p>
                                </div>
                                <div class="menu-card-price">
                                    <span>23€</span>
                                </div>
                                <div class="menu-card-checkmark">
                                    <span class="menu-card-checkmark-icon">
                                        <i class="fa-solid fa-check" aria-hidden="true"></i>
                                    </span>
                                </div>
                            </div>
                        </label>
                    </li>
                </ul>
            </div>

            <!-- ========================================
                 ORDER BUTTON
            ======================================== -->
            <button type="submit" class="button button-up" aria-label="Passer la commande">Commander</button>
        </form>
    </main>

    <!-- ========================================
         FOOTER
         Site navigation and contact information
    ======================================== -->
    <footer>
        <img src="../assets/images/logo/ohmyfood.png" alt="Logo OhMyFood" />
        <nav aria-label="Navigation du pied de page">
            <a href="#" aria-label="Proposer votre restaurant sur OhMyFood">
                <i class="fa-solid fa-utensils" aria-hidden="true"></i>
                Proposer un restaurant
            </a>
            <a href="#" aria-label="Devenir partenaire OhMyFood">
                <i class="fa-solid fa-handshake-angle" aria-hidden="true"></i>
                Devenir partenaire
            </a>
            <a href="#" aria-label="Consulter les mentions légales">Mentions légales</a>
            <a href="mailto:contact@ohmyfood.com" aria-label="Contacter OhMyFood par email">Contact</a>
        </nav>
    </footer>
</body>

</html>
