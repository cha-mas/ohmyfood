<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander à La Palette du Goût - OhMyFood</title>
    <link rel="stylesheet" href="../assets/css/bundle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body>
    <header class="header-with-arrow">
        <a href="/">
            <i class="fa-solid fa-arrow-left"></i>
            <span class="sr-only">Retour à la page d'acceuil</span>
        </a>
        <img srcset="../assets/images/logo/ohmyfood.png, ../assets/images/logo/ohmyfood@2x.svg 2x"
            src="../assets/images/logo/ohmyfood.png" alt="Logo du site OhMyFood" />
    </header>
    <img src="../assets/images/restaurants/jay-wennington-N_Y88TWmGwA-unsplash.jpg" class="hero-media" />
    <div class="menu-container">
        <div class="restaurant-info">
            <h1>La palette du goût</h1>
            <input type="checkbox" id="fav-1" class="fav-checkbox" />
            <label for="fav-1" class="fav-label">
                <i class="fa-regular fa-heart regular-icon"></i>
                <i class="fa-solid fa-heart solid-icon"></i>
                <span class="sr-only">Ajouter ou supprimer de vos favoris</span>
            </label>
        </div>
        <div class="menu-category">
            <h2>Entrées</h2>
            <ul>
                <li>
                    <label class="menu-card">
                        <input type="checkbox" class="menu-card-checkbox">
                        <div class="menu-card-content">
                            <div class="menu-card-info">
                                <h3 class="menu-card-title">Fricassée d'escargots</h3>
                                <p class="menu-card-description">Au piment d'Espelette</p>
                            </div>
                            <div class="menu-card-price">
                                <span>25€</span>
                            </div>
                            <div class="menu-card-checkmark">
                                <span class="menu-card-checkmark-icon">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                            </div>
                        </div>
                    </label>
                </li>
                <li>
                    <label class="menu-card">
                        <input type="checkbox" class="menu-card-checkbox">
                        <div class="menu-card-content">
                            <div class="menu-card-info">
                                <h3 class="menu-card-title">Foie gras de canard mi-cuit</h3>
                                <p class="menu-card-description">Et ses copeaux de truffe noire</p>
                            </div>
                            <div class="menu-card-price">
                                <span>35€</span>
                            </div>
                            <div class="menu-card-checkmark">
                                <span class="menu-card-checkmark-icon">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                            </div>
                        </div>
                    </label>
                </li>
                <li>
                    <label class="menu-card">
                        <input type="checkbox" class="menu-card-checkbox">
                        <div class="menu-card-content">
                            <div class="menu-card-info">
                                <h3 class="menu-card-title">Œuf au plat</h3>
                                <p class="menu-card-description">Assaisonné à la truffe sur lit de caviar</p>
                            </div>
                            <div class="menu-card-price">
                                <span>20€</span>
                            </div>
                            <div class="menu-card-checkmark">
                                <span class="menu-card-checkmark-icon">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                            </div>
                        </div>
                    </label>
                </li>
            </ul>
        </div>
        <div class="menu-category">
            <h2>Plats</h2>
            <ul>
                <li>
                    <label class="menu-card">
                        <input type="checkbox" class="menu-card-checkbox">
                        <div class="menu-card-content">
                            <div class="menu-card-info">
                                <h3 class="menu-card-title">Filet de bœuf aux herbes</h3>
                                <p class="menu-card-description">Accompagné de sa ribambelle de légumes</p>
                            </div>
                            <div class="menu-card-price">
                                <span>40€</span>
                            </div>
                            <div class="menu-card-checkmark">
                                <span class="menu-card-checkmark-icon">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                            </div>
                        </div>
                    </label>
                </li>
                <li>
                    <label class="menu-card">
                        <input type="checkbox" class="menu-card-checkbox">
                        <div class="menu-card-content">
                            <div class="menu-card-info">
                                <h3 class="menu-card-title">Parmentier de queue de bœuf</h3>
                                <p class="menu-card-description">À la truffe noire sur sa purée de panais</p>
                            </div>
                            <div class="menu-card-price">
                                <span>35€</span>
                            </div>
                            <div class="menu-card-checkmark">
                                <span class="menu-card-checkmark-icon">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                            </div>
                        </div>
                    </label>
                </li>
                <li>
                    <label class="menu-card">
                        <input type="checkbox" class="menu-card-checkbox">
                        <div class="menu-card-content">
                            <div class="menu-card-info">
                                <h3 class="menu-card-title">Filet de turbot</h3>
                                <p class="menu-card-description">Aux agrumes</p>
                            </div>
                            <div class="menu-card-price">
                                <span>44€</span>
                            </div>
                            <div class="menu-card-checkmark">
                                <span class="menu-card-checkmark-icon">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                            </div>
                        </div>
                    </label>
                </li>
            </ul>
        </div>
        <div class="menu-category">
            <h2>Desserts</h2>
            <ul>
                <li>
                    <label class="menu-card">
                        <input type="checkbox" class="menu-card-checkbox">
                        <div class="menu-card-content">
                            <div class="menu-card-info">
                                <h3 class="menu-card-title">Paris-Brest</h3>
                                <p class="menu-card-description">Revisité</p>
                            </div>
                            <div class="menu-card-price">
                                <span>18€</span>
                            </div>
                            <div class="menu-card-checkmark">
                                <span class="menu-card-checkmark-icon">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                            </div>
                        </div>
                    </label>
                </li>
                <li>
                    <label class="menu-card">
                        <input type="checkbox" class="menu-card-checkbox">
                        <div class="menu-card-content">
                            <div class="menu-card-info">
                                <h3 class="menu-card-title">Macaron au chocolat d'exception </h3>
                                <p class="menu-card-description">Et glace à la vanille de Madagascar</p>
                            </div>
                            <div class="menu-card-price">
                                <span>22€</span>
                            </div>
                            <div class="menu-card-checkmark">
                                <span class="menu-card-checkmark-icon">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                            </div>
                        </div>
                    </label>
                </li>
                <li>
                    <label class="menu-card">
                        <input type="checkbox" class="menu-card-checkbox">
                        <div class="menu-card-content">
                            <div class="menu-card-info">
                                <h3 class="menu-card-title">Mousse au chocolat</h3>
                                <p class="menu-card-description">Au piment d'Espelette et à la truffe noire</p>
                            </div>
                            <div class="menu-card-price">
                                <span>23€</span>
                            </div>
                            <div class="menu-card-checkmark">
                                <span class="menu-card-checkmark-icon">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                            </div>
                        </div>
                    </label>
                </li>
            </ul>
        </div>
        <button class="button button-up">Commander</button>
    </div>
    <footer>
        <img src="../assets/images/logo/ohmyfood.png" alt="Logo de OhMyFood" />
        <nav>
            <a href="#">
                <i class="fa-solid fa-utensils"></i>
                Proposer un restaurant
            </a>
            <a href="#">
                <i class="fa-solid fa-handshake-angle"></i>
                Devenir partenaire
            </a>
            <a href="#"> Mentions légales </a>
            <a href="#"> Contact </a>
        </nav>
    </footer>
</body>

</html>
