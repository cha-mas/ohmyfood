<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander à La Palette du Goût - OhMyFood</title>
    <link rel="stylesheet" href="../assets/css/bundle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body>
    <header class="header-with-arrow">
        <a href="/">
            <i class="fa-solid fa-arrow-left"></i>
            <span class="sr-only">Retour à la page d'acceuil</span>
        </a>
        <img srcset="../assets/images/logo/ohmyfood.png, ../assets/images/logo/ohmyfood@2x.svg 2x"
            src="../assets/images/logo/ohmyfood.png" alt="Logo du site OhMyFood" />
    </header>
    <img src="../assets/images/restaurants/jay-wennington-N_Y88TWmGwA-unsplash.jpg" class="hero-media" />
    <div class="menu-container">
        <div class="restaurant-info">
            <h1>La palette du goût</h1>
            <input type="checkbox" id="fav-1" class="fav-checkbox" />
            <label for="fav-1" class="fav-label">
                <i class="fa-regular fa-heart regular-icon"></i>
                <i class="fa-solid fa-heart solid-icon"></i>
                <span class="sr-only">Ajouter ou supprimer de vos favoris</span>
            </label>
        </div>
        <div class="menu-category">
            <h2>Entrées</h2>
            <ul>
                <!--TODO: Entry Cards (with checkbox)-->
            </ul>
        </div>
