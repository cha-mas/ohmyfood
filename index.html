<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OhMyFood</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="./assets/css/bundle.css" />
</head>

<body>
    <header>
        <img srcset="./assets/images/logo/ohmyfood.png, ./assets/images/logo/ohmyfood@2x.svg 2x"
            src="./assets/images/logo/ohmyfood.png" alt="Logo du site OhMyFood" />
    </header>
    <div class="location">
        <i class="fa-solid fa-location-dot"></i>
        <p>Paris, Belleville</p>
    </div>
    <section class="hero">
        <h1>Réservez le menu qui vous convient</h1>
        <p>Découvrez des restaurants d'exception, sélectionnés par nos soins.</p>
        <a href="#restaurants" class="button button-up">
            Explorer nos restaurants
        </a>
    </section>
    <section class="explanations">
        <h2>Fonctionnement</h2>
        <div class="explanations-list">
            <article class="explanation-item">
                <div>
                    <i class="fa-solid fa-mobile-screen"></i>
                    <p>Choisissez un restaurant</p>
                </div>
            </article>
            <article class="explanation-item">
                <div>
                    <i class="fa-solid fa-list"></i>
                    <p>Composez votre menu</p>
                </div>
            </article>
            <article class="explanation-item">
                <div>
                    <i class="fa-solid fa-store"></i>
                    <p>Dégustez au restaurant</p>
                </div>
            </article>
        </div>
    </section>
</body>

</html>
